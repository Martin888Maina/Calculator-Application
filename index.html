<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main>
    <section class="calculator" aria-label="Calculator">

      <!-- Mode selector. Standard is the default; the other two panels are
           swapped in by the mode-switching logic. -->
      <div class="mode-toggle" role="tablist" aria-label="Calculator mode">
        <button type="button" class="mode-toggle__btn" data-mode="standard" role="tab" aria-selected="true">Standard</button>
        <button type="button" class="mode-toggle__btn" data-mode="scientific" role="tab" aria-selected="false">Scientific</button>
        <button type="button" class="mode-toggle__btn" data-mode="programmer" role="tab" aria-selected="false">Programmer</button>
      </div>

      <!-- Display: a small secondary line for the running expression sits above the
           primary result line. -->
      <div class="display" role="group" aria-label="Display">
        <div class="display__memory" id="memoryIndicator" aria-label="Memory holds a value" hidden>M</div>
        <div class="display__expression" id="expression" aria-hidden="true"></div>
        <div class="display__result" id="result" role="status" aria-live="polite" aria-atomic="true">0</div>
      </div>

      <!-- Scientific-mode toggles: angle unit and scientific notation.
           Shown only while scientific mode is active. -->
      <div class="sci-controls" id="sciControls" hidden>
        <button type="button" class="sci-toggle" id="angleToggle" aria-label="Angle unit, degrees or radians">DEG</button>
        <button type="button" class="sci-toggle" id="sciNotationToggle" aria-pressed="false" aria-label="Scientific notation">SCI</button>
      </div>

      <!-- Programmer-mode base readout. Shows the current value in all four
           bases at once; the active base is selectable. -->
      <div class="prog-bases" id="progBases" hidden>
        <button type="button" class="prog-base" data-base="16" aria-pressed="false">
          <span class="prog-base__label">HEX</span>
          <span class="prog-base__value" data-base-value="16">0</span>
        </button>
        <button type="button" class="prog-base" data-base="10" aria-pressed="true">
          <span class="prog-base__label">DEC</span>
          <span class="prog-base__value" data-base-value="10">0</span>
        </button>
        <button type="button" class="prog-base" data-base="8" aria-pressed="false">
          <span class="prog-base__label">OCT</span>
          <span class="prog-base__value" data-base-value="8">0</span>
        </button>
        <button type="button" class="prog-base" data-base="2" aria-pressed="false">
          <span class="prog-base__label">BIN</span>
          <span class="prog-base__value" data-base-value="2">0</span>
        </button>
      </div>

      <!-- Memory controls (MC, MR, M+, M-, MS). -->
      <div class="memory-bar">
        <button type="button" class="key key--memory" data-action="memory-clear" aria-label="Memory clear">MC</button>
        <button type="button" class="key key--memory" data-action="memory-recall" aria-label="Memory recall">MR</button>
        <button type="button" class="key key--memory" data-action="memory-add" aria-label="Memory add">M+</button>
        <button type="button" class="key key--memory" data-action="memory-subtract" aria-label="Memory subtract">M&#8722;</button>
        <button type="button" class="key key--memory" data-action="memory-store" aria-label="Memory store">MS</button>
      </div>

      <!-- Keypad area. Each mode has its own panel; only the active one is
           shown. -->
      <div class="keypads">

      <!-- Standard keypad. Order: control row, function row, then digits with
           the operator column on the right. -->
      <div class="keypad" data-mode-panel="standard">
        <button type="button" class="key key--fn" data-action="clear" aria-label="All clear">AC</button>
        <button type="button" class="key key--fn" data-action="delete" aria-label="Delete">&#9003;</button>
        <button type="button" class="key key--fn" data-action="negate" aria-label="Toggle sign">&#177;</button>
        <button type="button" class="key key--fn" data-action="percent" aria-label="Percent">%</button>

        <button type="button" class="key key--fn" data-action="sqrt" aria-label="Square root">&#8730;</button>
        <button type="button" class="key key--fn" data-action="square" aria-label="Square">x&#178;</button>
        <button type="button" class="key key--fn" data-action="reciprocal" aria-label="Reciprocal">1/x</button>
        <button type="button" class="key key--op" data-operator="divide" aria-label="Divide">&#247;</button>

        <button type="button" class="key key--digit" data-digit="7" aria-label="7">7</button>
        <button type="button" class="key key--digit" data-digit="8" aria-label="8">8</button>
        <button type="button" class="key key--digit" data-digit="9" aria-label="9">9</button>
        <button type="button" class="key key--op" data-operator="multiply" aria-label="Multiply">&#215;</button>

        <button type="button" class="key key--digit" data-digit="4" aria-label="4">4</button>
        <button type="button" class="key key--digit" data-digit="5" aria-label="5">5</button>
        <button type="button" class="key key--digit" data-digit="6" aria-label="6">6</button>
        <button type="button" class="key key--op" data-operator="subtract" aria-label="Subtract">&#8722;</button>

        <button type="button" class="key key--digit" data-digit="1" aria-label="1">1</button>
        <button type="button" class="key key--digit" data-digit="2" aria-label="2">2</button>
        <button type="button" class="key key--digit" data-digit="3" aria-label="3">3</button>
        <button type="button" class="key key--op" data-operator="add" aria-label="Add">+</button>

        <button type="button" class="key key--digit key--zero" data-digit="0" aria-label="0">0</button>
        <button type="button" class="key key--digit" data-action="decimal" aria-label="Decimal point">.</button>
        <button type="button" class="key key--eq" data-action="equals" aria-label="Equals">=</button>
      </div>

      <!-- Scientific keypad. Two side-by-side blocks (functions on the left,
           number pad on the right) keep the layout wide rather than tall. -->
      <div class="keypad--sci" data-mode-panel="scientific" hidden>

        <!-- Function and constant keys -->
        <div class="sci-funcs">
          <button type="button" class="key key--fn" data-input="sin(" aria-label="Sine">sin</button>
          <button type="button" class="key key--fn" data-input="cos(" aria-label="Cosine">cos</button>
          <button type="button" class="key key--fn" data-input="tan(" aria-label="Tangent">tan</button>
          <button type="button" class="key key--fn" data-input="&#960;" aria-label="Pi">&#960;</button>

          <button type="button" class="key key--fn" data-input="asin(" aria-label="Inverse sine">asin</button>
          <button type="button" class="key key--fn" data-input="acos(" aria-label="Inverse cosine">acos</button>
          <button type="button" class="key key--fn" data-input="atan(" aria-label="Inverse tangent">atan</button>
          <button type="button" class="key key--fn" data-input="e" aria-label="Euler's number">e</button>

          <button type="button" class="key key--fn" data-input="sinh(" aria-label="Hyperbolic sine">sinh</button>
          <button type="button" class="key key--fn" data-input="cosh(" aria-label="Hyperbolic cosine">cosh</button>
          <button type="button" class="key key--fn" data-input="tanh(" aria-label="Hyperbolic tangent">tanh</button>
          <button type="button" class="key key--fn" data-input="mod" aria-label="Modulo">mod</button>

          <button type="button" class="key key--fn" data-input="log(" aria-label="Base ten logarithm">log</button>
          <button type="button" class="key key--fn" data-input="ln(" aria-label="Natural logarithm">ln</button>
          <button type="button" class="key key--fn" data-input="logb(" aria-label="Logarithm of arbitrary base">logb</button>
          <button type="button" class="key key--fn" data-input="abs(" aria-label="Absolute value">|x|</button>

          <button type="button" class="key key--fn" data-input="&#8730;(" aria-label="Square root">&#8730;</button>
          <button type="button" class="key key--fn" data-input="&#8731;(" aria-label="Cube root">&#8731;</button>
          <button type="button" class="key key--fn" data-input="nthroot(" aria-label="Nth root">y&#8730;x</button>
          <button type="button" class="key key--fn" data-input="!" aria-label="Factorial">n!</button>

          <button type="button" class="key key--fn" data-input="^" aria-label="Power">x^y</button>
          <button type="button" class="key key--fn" data-input="^3" aria-label="Cube">x&#179;</button>
          <button type="button" class="key key--fn" data-input="e^(" aria-label="e to the power x">e^x</button>
          <button type="button" class="key key--fn" data-input="10^(" aria-label="10 to the power x">10^x</button>
        </div>

        <!-- Number pad, operators, parentheses, and equals -->
        <div class="sci-pad">
          <button type="button" class="key key--fn" data-input="(" aria-label="Open parenthesis">(</button>
          <button type="button" class="key key--fn" data-input=")" aria-label="Close parenthesis">)</button>
          <button type="button" class="key key--fn" data-action="clear" aria-label="All clear">AC</button>
          <button type="button" class="key key--fn" data-action="delete" aria-label="Delete">&#9003;</button>

          <button type="button" class="key key--digit" data-input="7" aria-label="7">7</button>
          <button type="button" class="key key--digit" data-input="8" aria-label="8">8</button>
          <button type="button" class="key key--digit" data-input="9" aria-label="9">9</button>
          <button type="button" class="key key--op" data-input="&#247;" aria-label="Divide">&#247;</button>

          <button type="button" class="key key--digit" data-input="4" aria-label="4">4</button>
          <button type="button" class="key key--digit" data-input="5" aria-label="5">5</button>
          <button type="button" class="key key--digit" data-input="6" aria-label="6">6</button>
          <button type="button" class="key key--op" data-input="&#215;" aria-label="Multiply">&#215;</button>

          <button type="button" class="key key--digit" data-input="1" aria-label="1">1</button>
          <button type="button" class="key key--digit" data-input="2" aria-label="2">2</button>
          <button type="button" class="key key--digit" data-input="3" aria-label="3">3</button>
          <button type="button" class="key key--op" data-input="&#8722;" aria-label="Subtract">&#8722;</button>

          <button type="button" class="key key--digit" data-input="0" aria-label="0">0</button>
          <button type="button" class="key key--digit" data-input="." aria-label="Decimal point">.</button>
          <button type="button" class="key key--fn" data-input="," aria-label="Comma">,</button>
          <button type="button" class="key key--op" data-input="+" aria-label="Add">+</button>

          <button type="button" class="key key--fn" data-action="ans" aria-label="Last answer">ANS</button>
          <button type="button" class="key key--eq key--eq-sci" data-action="equals" aria-label="Equals">=</button>
        </div>
      </div>

      <!-- Programmer keypad. Hex digit keys enable only for hexadecimal
           input; operators are bitwise. -->
      <div class="keypad keypad--prog" data-mode-panel="programmer" hidden>
        <button type="button" class="key key--digit" data-prog-digit="A" aria-label="Hex A">A</button>
        <button type="button" class="key key--digit" data-prog-digit="B" aria-label="Hex B">B</button>
        <button type="button" class="key key--digit" data-prog-digit="C" aria-label="Hex C">C</button>
        <button type="button" class="key key--fn" data-prog-action="clear" aria-label="All clear">AC</button>
        <button type="button" class="key key--fn" data-prog-action="delete" aria-label="Delete">&#9003;</button>

        <button type="button" class="key key--digit" data-prog-digit="D" aria-label="Hex D">D</button>
        <button type="button" class="key key--digit" data-prog-digit="E" aria-label="Hex E">E</button>
        <button type="button" class="key key--digit" data-prog-digit="F" aria-label="Hex F">F</button>
        <button type="button" class="key key--op" data-prog-op="and" aria-label="Bitwise and">AND</button>
        <button type="button" class="key key--op" data-prog-op="or" aria-label="Bitwise or">OR</button>

        <button type="button" class="key key--digit" data-prog-digit="7" aria-label="7">7</button>
        <button type="button" class="key key--digit" data-prog-digit="8" aria-label="8">8</button>
        <button type="button" class="key key--digit" data-prog-digit="9" aria-label="9">9</button>
        <button type="button" class="key key--op" data-prog-op="xor" aria-label="Bitwise xor">XOR</button>
        <button type="button" class="key key--op" data-prog-action="not" aria-label="Bitwise not">NOT</button>

        <button type="button" class="key key--digit" data-prog-digit="4" aria-label="4">4</button>
        <button type="button" class="key key--digit" data-prog-digit="5" aria-label="5">5</button>
        <button type="button" class="key key--digit" data-prog-digit="6" aria-label="6">6</button>
        <button type="button" class="key key--op" data-prog-op="shl" aria-label="Shift left">&lt;&lt;</button>
        <button type="button" class="key key--op" data-prog-op="shr" aria-label="Shift right">&gt;&gt;</button>

        <button type="button" class="key key--digit" data-prog-digit="1" aria-label="1">1</button>
        <button type="button" class="key key--digit" data-prog-digit="2" aria-label="2">2</button>
        <button type="button" class="key key--digit" data-prog-digit="3" aria-label="3">3</button>
        <button type="button" class="key key--digit" data-prog-digit="0" aria-label="0">0</button>
        <button type="button" class="key key--eq" data-prog-action="equals" aria-label="Equals">=</button>
      </div>

      </div>

      <!-- Calculation history. Hidden until the first result is recorded;
           each entry can be tapped to reuse its result. -->
      <div class="history" id="history" hidden>
        <div class="history__header">
          <span class="history__title">History</span>
          <button type="button" class="history__clear" id="clearHistory">Clear</button>
        </div>
        <ul class="history__list" id="historyList"></ul>
      </div>

    </section>
  </main>

  <!-- Application logic. The parser and scientific library power
       scientific-mode expressions and load before the main script. -->
  <script src="js/parser.js"></script>
  <script src="js/scientific.js"></script>
  <script src="js/programmer.js"></script>
  <script src="js/calculator.js"></script>
</body>
</html>
